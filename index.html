<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SynapseX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --bg:                  #000000;
      --bg-surface:          #0D0D0D;
      --card-bg:             #111411;
      --card-bg-dimmed:      #0C0F0C;
      --nav-pill-bg:         #1A1A1A;
      --text-primary:        #F0F0F0;
      --text-secondary:      #9E9E9E;
      --text-tertiary:       #555555;
      --text-nav-cta:        #0A0A0A;
      --text-card-label:     #7A7A7A;
      --accent-core:         #3DDC84;
      --accent-mid:          #2AB56A;
      --accent-glow:         #1A5C38;
      --accent-glow-far:     #0B2B1C;
      --btn-cta-bg:          #F2F2F2;
      --btn-cta-text:        #080808;
      --glow-head-shadow:
        0 0 40px  2px  rgba(61,220,132,0.20),
        0 0 100px 20px rgba(26,92,56,0.27),
        0 0 200px 60px rgba(11,43,28,0.40);
      --glow-card-center:
        0 0 24px  4px  rgba(61,220,132,0.13),
        0 0 60px  16px rgba(26,92,56,0.20);

      --font-mono: 'JetBrains Mono', 'Space Mono', 'IBM Plex Mono', monospace;

      --type-hero-headline-size:           clamp(36px, 6.7vw, 72px);
      --type-hero-headline-line-height:    1.11;
      --type-hero-headline-letter-spacing: -0.02em;

      --type-right-headline-size:           clamp(24px, 5.2vw, 56px);
      --type-right-headline-line-height:    1.14;
      --type-right-headline-letter-spacing: -0.02em;

      --type-body-size:           13px;
      --type-body-line-height:    22px;
      --type-body-letter-spacing: 0.01em;

      --type-manifesto-size:           clamp(13px, 1.7vw, 18px);
      --type-manifesto-line-height:    1.67;
      --type-manifesto-letter-spacing: 0.005em;

      --type-card-stat-size:           clamp(28px, 4.4vw, 48px);
      --type-card-stat-line-height:    1.08;
      --type-card-stat-letter-spacing: -0.03em;

      --type-card-title-size:           10px;
      --type-card-title-line-height:    16px;
      --type-card-title-letter-spacing: 0.18em;

      --type-card-bullet-size:           11px;
      --type-card-bullet-line-height:    18px;
      --type-card-bullet-letter-spacing: 0.01em;

      --type-card-caption-size:           9px;
      --type-card-caption-line-height:    14px;
      --type-card-caption-letter-spacing: 0.16em;

      --type-nav-size:           13px;
      --type-nav-line-height:    20px;
      --type-nav-letter-spacing: 0.02em;

      --layout-h-padding: clamp(20px, 4.4vw, 48px);
      --nav-height:       56px;
      --card-width:       clamp(200px, 26vw, 280px);
      --card-height:      clamp(260px, 31.5vw, 340px);
      --card-padding:     24px;
      --card-radius:      16px;
      --card-gap:         16px;
      --nav-pill-radius:  999px;

      --card-scale-center:      1.00;
      --card-scale-adjacent:    0.88;
      --card-scale-outer:       0.76;
      --card-opacity-center:    1.00;
      --card-opacity-adjacent:  0.60;
      --card-opacity-outer:     0.30;
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ============================================================
       NAV BAR
       ============================================================ */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--nav-height);
      padding: 0 var(--layout-h-padding);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.00) 100%
      );
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--nav-pill-bg);
      border-radius: var(--nav-pill-radius);
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: var(--type-nav-size);
      line-height: var(--type-nav-line-height);
      letter-spacing: var(--type-nav-letter-spacing);
      color: var(--text-primary);
      white-space: nowrap;
      transition: background 200ms ease;
    }
    .nav-pill:hover { background: #252525; }

    .nav-hamburger {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--nav-pill-bg);
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background 200ms ease;
    }
    .nav-hamburger:hover { background: #252525; }

    .nav-hamburger span {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-hamburger span i {
      display: block;
      width: 14px;
      height: 1.5px;
      background: var(--text-primary);
      border-radius: 2px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: var(--btn-cta-bg);
      border-radius: var(--nav-pill-radius);
      border: none;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: var(--type-nav-size);
      line-height: var(--type-nav-line-height);
      letter-spacing: var(--type-nav-letter-spacing);
      color: var(--btn-cta-text);
      font-weight: 400;
      white-space: nowrap;
      transition: opacity 200ms ease;
    }
    .nav-cta:hover { opacity: 0.85; }

    .icon-gear {
      width: 14px;
      height: 14px;
      color: var(--accent-core);
      flex-shrink: 0;
    }

    .icon-apple {
      width: 13px;
      height: 13px;
      color: var(--btn-cta-text);
      flex-shrink: 0;
    }

    /* ============================================================
       STATE 1 — HERO
       ============================================================ */
    #hero {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: 1fr;
      align-items: center;
      padding: var(--nav-height) var(--layout-h-padding) 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 700ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }
    #hero.active {
      opacity: 1;
      pointer-events: auto;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding-right: clamp(16px, 3vw, 32px);
      align-self: center;
      margin-top: -40px;
    }

    .hero-headline {
      font-size: var(--type-hero-headline-size);
      line-height: var(--type-hero-headline-line-height);
      letter-spacing: var(--type-hero-headline-letter-spacing);
      font-weight: 400;
      color: var(--text-primary);
      font-style: normal;
      white-space: nowrap;
      margin-bottom: 20px;
      min-height: calc(var(--type-hero-headline-size) * var(--type-hero-headline-line-height) * 2);
    }

    .hero-body {
      font-size: var(--type-body-size);
      line-height: var(--type-body-line-height);
      letter-spacing: var(--type-body-letter-spacing);
      color: var(--text-secondary);
      max-width: clamp(200px, 28vw, 300px);
      opacity: 0;
      animation: bodyFadeIn 400ms 600ms ease-out forwards;
    }

    @keyframes bodyFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* Hero asset container */
    .hero-asset {
      position: relative;
      width: clamp(220px, 35vw, 420px);
      height: clamp(240px, 38vw, 440px);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-asset-glow {
      position: absolute;
      inset: -60px;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(61,220,132,0.18) 0%,
        rgba(26,92,56,0.12)  35%,
        rgba(11,43,28,0.06)  60%,
        transparent          80%
      );
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.8; transform: scale(1.00); }
      50%       { opacity: 1.0; transform: scale(1.06); }
    }

    /* Three.js canvas — replaces SVG */
    #neural-head-canvas {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      padding-left: clamp(16px, 3vw, 32px);
      align-self: center;
      margin-top: clamp(60px, 11vw, 120px);
    }

    .hero-right-headline {
      font-size: var(--type-right-headline-size);
      line-height: var(--type-right-headline-line-height);
      letter-spacing: var(--type-right-headline-letter-spacing);
      font-weight: 400;
      color: var(--text-primary);
      white-space: nowrap;
      text-align: right;
      min-height: calc(var(--type-right-headline-size) * var(--type-right-headline-line-height) * 2);
    }

    /* Cipher character spans */
    .cipher-char {
      display: inline-block;
      color: var(--text-primary);
      transition: color 80ms linear, opacity 60ms linear;
    }
    .cipher-char.scrambling {
      color:   #666666;
      opacity: 0.7;
    }
    .cipher-char.resolved {
      color:   var(--text-primary);
      opacity: 1.0;
    }
    .cipher-break { display: block; }

    /* ============================================================
       STATE 2 — MANIFESTO
       ============================================================ */
    #manifesto {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: var(--nav-height);
      opacity: 0;
      pointer-events: none;
      transition: opacity 700ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
      overflow: hidden;
    }
    #manifesto.active {
      opacity: 1;
      pointer-events: auto;
    }

    .manifesto-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 60% 50% at 50% 55%,
        rgba(61,220,132,0.10) 0%,
        rgba(11,43,28,0.08)  40%,
        transparent          70%
      );
      pointer-events: none;
      filter: blur(20px);
    }

    .manifesto-scroll-container {
      position: relative;
      width: min(520px, 90vw);
      max-height: 55vh;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent     0%,
        rgba(0,0,0,0.3) 12%,
        black           28%,
        black           80%,
        transparent     100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent     0%,
        rgba(0,0,0,0.3) 12%,
        black           28%,
        black           80%,
        transparent     100%
      );
    }

    .manifesto-track {
      display: flex;
      flex-direction: column;
      transition: transform 400ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .manifesto-line {
      font-size:      var(--type-manifesto-size);
      line-height:    var(--type-manifesto-line-height);
      letter-spacing: var(--type-manifesto-letter-spacing);
      font-weight:    400;
      font-style:     italic;
      color:          var(--text-primary);
      text-align:     center;
      opacity:        0;
      transform:      translateY(10px);
      will-change:    transform, opacity;
    }

    @keyframes manifestoLineEnter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .manifesto-line.aging-1 { color: rgba(240,240,240,0.70); }
    .manifesto-line.aging-2 { color: rgba(240,240,240,0.40); }
    .manifesto-line.aging-3 { color: rgba(240,240,240,0.15); }
    .manifesto-line.aging-4 { color: rgba(240,240,240,0.04); }

    /* ============================================================
       STATE 3 — CAROUSEL
       ============================================================ */
    #carousel-scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: var(--nav-height);
      opacity: 0;
      pointer-events: none;
      transition: opacity 700ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
      overflow: hidden;
    }
    #carousel-scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    .carousel-glow {
      position: absolute;
      width: 60vw;
      height: 60vh;
      border-radius: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(61,220,132,0.12) 0%,
        rgba(26,92,56,0.07)  40%,
        transparent          70%
      );
      filter: blur(30px);
      pointer-events: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -45%);
      animation: glowPulse 5s ease-in-out infinite;
    }

    .carousel-viewport {
      position: relative;
      width: 100%;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(var(--card-height) * 1.18);
    }

    .carousel-track {
      display: flex;
      align-items: center;
      gap: var(--card-gap);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      transition: transform 600ms cubic-bezier(0.34, 1.20, 0.64, 1);
      will-change: transform;
    }

    .carousel-card {
      flex-shrink: 0;
      width: var(--card-width);
      height: var(--card-height);
      border-radius: var(--card-radius);
      background: var(--card-bg);
      padding: var(--card-padding);
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      transition:
        transform  600ms cubic-bezier(0.34, 1.20, 0.64, 1),
        opacity    600ms cubic-bezier(0.25, 0.46, 0.45, 0.94),
        filter     600ms cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 600ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform, opacity, filter;
      animation: cardUnfold 500ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardUnfold {
      from {
        opacity:          0;
        transform:        scaleY(0.3);
        transform-origin: bottom center;
      }
      to {
        opacity:   1;
        transform: scaleY(1.0);
      }
    }

    .carousel-card[data-depth="center"] {
      transform:  scale(var(--card-scale-center));
      opacity:    var(--card-opacity-center);
      filter:     blur(0px);
      box-shadow: var(--glow-card-center);
    }
    .carousel-card[data-depth="adjacent"] {
      transform:  scale(var(--card-scale-adjacent));
      opacity:    var(--card-opacity-adjacent);
      filter:     blur(1.5px);
      box-shadow: none;
    }
    .carousel-card[data-depth="outer"] {
      transform:  scale(var(--card-scale-outer));
      opacity:    var(--card-opacity-outer);
      filter:     blur(3px);
      box-shadow: none;
    }

    .card-title {
      font-size:      var(--type-card-title-size);
      line-height:    var(--type-card-title-line-height);
      letter-spacing: var(--type-card-title-letter-spacing);
      font-weight:    400;
      color:          var(--text-card-label);
      text-transform: uppercase;
      margin-bottom:  12px;
      opacity: 0;
      animation: cardContentFade 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .card-stat {
      font-size:      var(--type-card-stat-size);
      line-height:    var(--type-card-stat-line-height);
      letter-spacing: var(--type-card-stat-letter-spacing);
      font-weight:    700;
      color:          var(--text-primary);
      margin-bottom:  20px;
      opacity: 0;
      animation: cardContentFade 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .card-bullets {
      list-style: none;
      display:    flex;
      flex-direction: column;
      gap:        8px;
      flex:       1;
      opacity: 0;
      animation: cardContentFade 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .card-bullets li {
      font-size:      var(--type-card-bullet-size);
      line-height:    var(--type-card-bullet-line-height);
      letter-spacing: var(--type-card-bullet-letter-spacing);
      color:          var(--text-secondary);
      display:        flex;
      align-items:    flex-start;
      gap:            7px;
    }

    .card-bullets li::before {
      content:      '';
      display:      block;
      width:        5px;
      height:       5px;
      border-radius: 50%;
      background:   var(--text-tertiary);
      flex-shrink:  0;
      margin-top:   6px;
    }

    .card-caption {
      font-size:      var(--type-card-caption-size);
      line-height:    var(--type-card-caption-line-height);
      letter-spacing: var(--type-card-caption-letter-spacing);
      font-weight:    400;
      color:          var(--text-card-label);
      text-transform: uppercase;
      margin-top:     16px;
      opacity: 0;
      animation: cardContentFade 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes cardContentFade {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ============================================================
       UTILITY
       ============================================================ */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ============================================================
       NAV BAR
       ============================================================ -->
  <nav role="navigation" aria-label="Primary">
    <div class="nav-left">
      <button class="nav-pill" aria-label="SynapseX home">
        <svg class="icon-gear" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"
                stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        SynapseX
      </button>
      <button class="nav-hamburger" aria-label="Open menu">
        <span aria-hidden="true"><i></i><i></i><i></i></span>
      </button>
    </div>
    <button class="nav-cta" aria-label="Download SynapseX">
      <svg class="icon-apple" viewBox="0 0 14 16" fill="currentColor" aria-hidden="true">
        <path d="M11.04 8.38c-.02-1.96 1.6-2.9 1.67-2.95-0.91-1.33-2.33-1.51-2.84-1.53-1.21-.12-2.37.71-2.99.71-.62 0-1.57-.7-2.59-.68C2.77 3.95 1.5 4.8.79 6.1c-1.43 2.48-.37 6.15 1.02 8.16.68.98 1.49 2.08 2.55 2.04 1.03-.04 1.42-.66 2.66-.66 1.24 0 1.6.66 2.68.64 1.1-.02 1.79-1 2.47-1.99.78-1.13 1.09-2.24 1.11-2.3-.02-.01-2.12-.81-2.14-3.21zM8.98 2.73C9.53 2.07 9.9 1.16 9.8.22c-.78.04-1.74.52-2.3 1.18-.5.58-.95 1.52-.83 2.41.87.07 1.75-.44 2.31-1.08z"/>
      </svg>
      Download
    </button>
  </nav>

  <!-- ============================================================
       STATE 1 — HERO
       ============================================================ -->
  <section id="hero" aria-label="Hero" role="region">

    <div class="hero-left">
      <h1 class="hero-headline" id="hero-headline-left" aria-label="Brain And Body"></h1>
      <p class="hero-body">
        Built at the intersection of neuroscience and artificial intelligence.
        SynapseX continuously maps neural pathways, cognitive load, and
        physiological states into a single adaptive intelligence layer.
      </p>
    </div>

    <div class="hero-asset" aria-hidden="true">
      <div class="hero-asset-glow"></div>
      <!-- Three.js neural head canvas — populated by JS below -->
      <canvas id="neural-head-canvas"></canvas>
    </div>

    <div class="hero-right">
      <h2 class="hero-right-headline" id="hero-headline-right" aria-label="One Network"></h2>
    </div>

  </section>

  <!-- ============================================================
       STATE 2 — MANIFESTO
       ============================================================ -->
  <section id="manifesto" aria-label="Manifesto" role="region" aria-live="polite">
    <div class="manifesto-glow" aria-hidden="true"></div>
    <div class="manifesto-scroll-container">
      <div class="manifesto-track" id="manifestoTrack"></div>
    </div>
  </section>

  <!-- ============================================================
       STATE 3 — CAROUSEL
       ============================================================ -->
  <section id="carousel-scene" aria-label="Live Metrics" role="region">
    <div class="carousel-glow" aria-hidden="true"></div>
    <div class="carousel-viewport" aria-label="Metrics carousel">
      <div class="carousel-track" id="carouselTrack" role="list"></div>
    </div>
  </section>

</div><!-- /#app -->

<!-- ============================================================

/* ================================================================
   SECTION B — UTILITY HELPERS
   ================================================================ */

function randomGlyph() {
  return GLYPH_POOL[Math.floor(Math.random() * GLYPH_POOL.length)];
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function smoothstep(e0, e1, x) {
  const t = clamp((x - e0) / (e1 - e0), 0, 1);
  return t * t * (3 - 2 * t);
}

function buildCipherTarget(container, text) {
  container.innerHTML = '';
  const charData = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '\n') {
      const br = document.createElement('span');
      br.className = 'cipher-break';
      container.appendChild(br);
    } else {
      const span = document.createElement('span');
      span.className = 'cipher-char scrambling';
      span.textContent = randomGlyph();
      container.appendChild(span);
      charData.push({ span, finalChar: ch });
    }
  }
  return charData;
}

async function runCipherDecode(container, text) {
  const charData = buildCipherTarget(container, text);
  if (charData.length === 0) return;

  const scrambleInterval = setInterval(() => {
    charData.forEach(({ span }) => {
      if (span.classList.contains('scrambling')) {
        span.textContent = randomGlyph();
      }
    });
  }, TIMING.cipherSwapInterval);

  const lockPromises = charData.map(({ span, finalChar }, index) =>
    sleep(TIMING.cipherScramblePre + index * TIMING.cipherCharStagger).then(() => {
      span.textContent = finalChar;
      span.classList.remove('scrambling');
      span.classList.add('resolved');
    })
  );

  await Promise.all(lockPromises);
  clearInterval(scrambleInterval);
}

  manifestoTrack.innerHTML = '';

  await switchScene('manifesto');
  await sleep(200);

  let lineHeightPx = 30;

  for (let i = 0; i < MANIFESTO_LINES.length; i++) {
    const lineText = MANIFESTO_LINES[i];

    const lineEl = document.createElement('p');
    lineEl.className = 'manifesto-line';
    lineEl.setAttribute('aria-label', lineText || 'pause');
    manifestoTrack.appendChild(lineEl);

    if (i === 0) {
      lineHeightPx = parseFloat(getComputedStyle(lineEl).lineHeight) || 30;
    }

    void lineEl.offsetWidth;

    if (lineText === '') {
      lineEl.innerHTML = '&nbsp;';
      lineEl.style.opacity = '0';
      await sleep(TIMING.manifestoLineInterval * 0.6);
    } else {
      const charData = buildCipherTarget(lineEl, lineText);

      const scrambleInterval = setInterval(() => {
        charData.forEach(({ span }) => {
          if (span.classList.contains('scrambling')) {
            span.textContent = randomGlyph();
          }
        });
      }, TIMING.cipherSwapInterval);

      const lockPromises = charData.map(({ span, finalChar }, idx) =>
        sleep(200 + idx * 20).then(() => {
          span.textContent = finalChar;
          span.classList.remove('scrambling');
          span.classList.add('resolved');
        })
      );

      await Promise.all(lockPromises);
      clearInterval(scrambleInterval);

      lineEl.style.animation = 'none';
      lineEl.style.opacity   = '1';
      lineEl.style.transform = 'translateY(0)';

      const allLines = manifestoTrack.querySelectorAll('.manifesto-line');
      const total    = allLines.length;
      allLines.forEach((el, idx) => {
        el.classList.remove('aging-1','aging-2','aging-3','aging-4');
        const age = total - 1 - idx;
        if (age >= 1 && age <= 2) el.classList.add('aging-1');
        if (age >= 3 && age <= 4) el.classList.add('aging-2');
        if (age >= 5 && age <= 6) el.classList.add('aging-3');
        if (age >= 7)             el.classList.add('aging-4');
      });

      if (i > 3) {
        const scrollAmount = (i - 3) * lineHeightPx;
        manifestoTrack.style.transform = `translateY(-${scrollAmount}px)`;
      }

      await sleep(TIMING.manifestoLineInterval);
    }

const carouselTrack = document.getElementById('carouselTrack');
let carouselCenterIndex = 1;
let carouselDirection   = 1;
let carouselAutoTimer   = null;

function buildCarousel() {
  carouselTrack.innerHTML = '';
  CARDS.forEach((card, i) => {
    const cardEl = document.createElement('article');
    cardEl.className = 'carousel-card';
    cardEl.dataset.index = i;
    cardEl.setAttribute('role', 'listitem');
    cardEl.setAttribute('aria-label', `${card.title}: ${card.stat}`);
    cardEl.style.animationDelay = `${i * 60}ms`;

    const d1 = `${i * 60 + 80}ms`;
    const d2 = `${i * 60 + 200}ms`;
    const d3 = `${i * 60 + 360}ms`;
    const d4 = `${i * 60 + 440}ms`;

    cardEl.innerHTML = `
      <div class="card-title"   style="animation-delay:${d1}">${card.title}</div>
      <div class="card-stat"    style="animation-delay:${d2}">${card.stat}</div>
      <ul  class="card-bullets" style="animation-delay:${d3}" aria-label="Details">
        ${card.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
      <div class="card-caption" style="animation-delay:${d4}">${card.caption}</div>
    `;

    carouselTrack.appendChild(cardEl);
  });
}

function updateCarouselDepth(centerIndex) {
  const cards    = carouselTrack.querySelectorAll('.carousel-card');
  if (!cards.length) return;
  const cardWidth = cards[0].offsetWidth;
  const cardGap   = parseInt(getComputedStyle(carouselTrack).gap) || 16;
  const step      = cardWidth + cardGap;

  cards.forEach((card, i) => {
    const dist = Math.abs(i - centerIndex);
    card.setAttribute('data-depth',
      dist === 0 ? 'center' :
      dist === 1 ? 'adjacent' : 'outer'
    );
  });

  const midOffset  = (CARDS.length - 1) / 2;
  const translateX = -(centerIndex - midOffset) * step;
  carouselTrack.style.transform = `translateX(calc(-50% + ${translateX}px))`;
}

function advanceCarousel() {
  carouselCenterIndex += carouselDirection;
  if (carouselCenterIndex >= CARDS.length - 1) {
    carouselCenterIndex = CARDS.length - 1;
    carouselDirection   = -1;
  } else if (carouselCenterIndex <= 0) {
    carouselCenterIndex = 0;
    carouselDirection   = 1;
  }
  updateCarouselDepth(carouselCenterIndex);
}

function startCarouselAutoScroll() {
  stopCarouselAutoScroll();
  carouselAutoTimer = setInterval(advanceCarousel, TIMING.carouselAutoScrollInterval);
}

function stopCarouselAutoScroll() {
  if (carouselAutoTimer) { clearInterval(carouselAutoTimer); carouselAutoTimer = null; }
}

async function runCarousel() {
  buildCarousel();
  carouselCenterIndex = 1;
  carouselDirection   = 1;

  carouselTrack.style.transition = 'none';
  updateCarouselDepth(carouselCenterIndex);

  await switchScene('carousel-scene');
  await sleep(50);
  carouselTrack.style.transition = '';

  startCarouselAutoScroll();
  await sleep(TIMING.carouselDuration);
  stopCarouselAutoScroll();
}

/* Carousel manual interaction */
carouselTrack.addEventListener('click', (e) => {
  const card = e.target.closest('.carousel-card');
  if (!card) return;
  const index = parseInt(card.dataset.index, 10);
  if (!isNaN(index)) {
    carouselCenterIndex = index;
    updateCarouselDepth(carouselCenterIndex);
    startCarouselAutoScroll();
  }
});

let pointerStartX = null;
carouselTrack.addEventListener('pointerdown', (e) => { pointerStartX = e.clientX; });
carouselTrack.addEventListener('pointerup',   (e) => {
  if (pointerStartX === null) return;
  const delta = e.clientX - pointerStartX;
  pointerStartX = null;
  if (Math.abs(delta) < 30) return;
  carouselDirection = delta < 0 ? 1 : -1;
  advanceCarousel();
  startCarouselAutoScroll();
});

/* ================================================================
   SECTION G — THREE.JS NEURAL HEAD
   ================================================================ */

(function initNeuralHead() {

  /* Design token mirrors */
  const TOKEN = {
    ACCENT_CORE:    0x3DDC84,
    ACCENT_GLOW:    0x1A5C38,
    NODE_COUNT:     2800,
    EDGE_PAIRS:     1400,
    PARTICLE_COUNT: 4200,
  };

  const canvas    = document.getElementById('neural-head-canvas');
  const container = canvas.parentElement;

  /* Renderer */
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias:       true,
    alpha:           true,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 0, 5);

  function onResize() {
    const w    = container.offsetWidth  || 420;
    const h    = container.offsetHeight || 440;
    const side = Math.min(w, h);
    renderer.setSize(side, side, false);
    canvas.style.width  = side + 'px';
    canvas.style.height = side + 'px';
    canvas.style.left   = ((w - side) / 2) + 'px';
    canvas.style.top    = ((h - side) / 2) + 'px';
    camera.aspect = 1;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);
  onResize();

  /* -- Head surface parametric function -- */
  function headSurface(t, phi) {
    const y = lerp(-1.30, 1.30, t);
    let rx, rz;

    if (t < 0.08) {
      const s = t / 0.08;
      rx = lerp(0.22, 0.30, s); rz = lerp(0.18, 0.24, s);
    } else if (t < 0.18) {
      const s = (t - 0.08) / 0.10;
      rx = lerp(0.30, 0.70, smoothstep(0,1,s));
      rz = lerp(0.24, 0.54, smoothstep(0,1,s));
    } else if (t < 0.38) {
      const s = (t - 0.18) / 0.20;
      rx = lerp(0.70, 0.80, Math.sin(s * Math.PI));
      rz = lerp(0.54, 0.68, Math.sin(s * Math.PI));
    } else if (t < 0.60) {
      const s = (t - 0.38) / 0.22;
      rx = lerp(0.80, 0.82, s); rz = lerp(0.68, 0.62, s);
    } else if (t < 0.80) {
      const s = (t - 0.60) / 0.20;
      rx = lerp(0.82, 0.78, s); rz = lerp(0.62, 0.72, s);
    } else {
      const s = (t - 0.80) / 0.20;
      rx = lerp(0.78, 0.12, smoothstep(0,1,s));
      rz = lerp(0.72, 0.10, smoothstep(0,1,s));
    }

    const frontBias = 0.06 * Math.cos(phi);
    return {
      x: rx * Math.cos(phi),
      y,
      z: (rz + frontBias) * Math.sin(phi),
    };
  }

  function jitter(v3, amount) {
    v3.x += (Math.random() - 0.5) * amount;
    v3.y += (Math.random() - 0.5) * amount;
    v3.z += (Math.random() - 0.5) * amount;
    return v3;
  }

  const coreColor = new THREE.Color(TOKEN.ACCENT_CORE);
  const glowColor = new THREE.Color(TOKEN.ACCENT_GLOW);

  /* ---- 1. NODE POINT CLOUD ---- */
  const nodePositions = new Float32Array(TOKEN.NODE_COUNT * 3);
  const nodeColors    = new Float32Array(TOKEN.NODE_COUNT * 3);
  const nodeVec3s     = [];

  for (let i = 0; i < TOKEN.NODE_COUNT; i++) {
    const t   = clamp((i / TOKEN.NODE_COUNT) + (Math.random() - 0.5) * (1 / TOKEN.NODE_COUNT), 0, 1);
    const phi = Math.random() * Math.PI * 2;
    const p   = headSurface(t, phi);
    const v   = new THREE.Vector3(p.x, p.y, p.z);
    jitter(v, 0.04);
    nodeVec3s.push(v.clone());

    nodePositions[i*3]   = v.x;
    nodePositions[i*3+1] = v.y;
    nodePositions[i*3+2] = v.z;

    const brightness = clamp(0.3 + 0.7*(t + (1 - Math.abs(Math.cos(phi)))*0.3), 0, 1);
    const col = coreColor.clone().lerp(glowColor, 1 - brightness);
    nodeColors[i*3]   = col.r;
    nodeColors[i*3+1] = col.g;
    nodeColors[i*3+2] = col.b;
  }

  const nodeGeo = new THREE.BufferGeometry();
  nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePositions, 3));
  nodeGeo.setAttribute('color',    new THREE.BufferAttribute(nodeColors,    3));

  const nodeMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:       { value: 0 },
      uPointScale: { value: renderer.getPixelRatio() * 120 },
    },
    vertexShader: `
      attribute vec3  color;
      uniform   float uTime;
      uniform   float uPointScale;
      varying   vec3  vColor;
      varying   float vBrightness;
      float hash(float n){ return fract(sin(n)*43758.5453123); }
      void main(){
        vColor = color;
        float phase  = hash(position.x*17.3+position.y*31.7+position.z*53.1);
        float breath = 0.92+0.08*sin(uTime*1.2+phase*6.28318);
        vec3  pos    = position*breath;
        float flow   = 0.018*sin(uTime*2.1+position.y*4.0+phase*6.28);
        pos.x += flow*cos(phase*6.28);
        pos.z += flow*sin(phase*6.28);
        vBrightness  = 0.5+0.5*sin(uTime*1.8+phase*6.28318);
        vec4 mvPos   = modelViewMatrix*vec4(pos,1.0);
        gl_PointSize = uPointScale/(-mvPos.z)*(1.5+vBrightness*1.5);
        gl_Position  = projectionMatrix*mvPos;
      }
    `,
    fragmentShader: `
      varying vec3  vColor;
      varying float vBrightness;
      void main(){
        vec2  uv   = gl_PointCoord*2.0-1.0;
        float dist = length(uv);
        if(dist>1.0) discard;
        float alpha = (1.0-dist)*(1.0-dist)*(0.6+0.4*vBrightness);
        vec3  col   = mix(vColor*2.5, vColor*0.6, dist*dist);
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent:  true,
    depthWrite:   false,
    vertexColors: true,
    blending:     THREE.AdditiveBlending,
  });

  const nodePoints = new THREE.Points(nodeGeo, nodeMat);

  /* ---- 2. EDGE FILAMENTS ---- */
  const GRID_CELL  = 0.35;
  const spatialGrid = new Map();

  nodeVec3s.forEach((v, i) => {
    const key = `${Math.floor(v.x/GRID_CELL)},${Math.floor(v.y/GRID_CELL)},${Math.floor(v.z/GRID_CELL)}`;
    if (!spatialGrid.has(key)) spatialGrid.set(key, []);
    spatialGrid.get(key).push(i);
  });

  function nearbyNodes(i, maxDist) {
    const v  = nodeVec3s[i];
    const r  = Math.ceil(maxDist / GRID_CELL);
    const gx = Math.floor(v.x/GRID_CELL);
    const gy = Math.floor(v.y/GRID_CELL);
    const gz = Math.floor(v.z/GRID_CELL);
    const result = [];
    for (let dx=-r; dx<=r; dx++) {
      for (let dy=-r; dy<=r; dy++) {
        for (let dz=-r; dz<=r; dz++) {
          const cell = spatialGrid.get(`${gx+dx},${gy+dy},${gz+dz}`);
          if (!cell) continue;
          cell.forEach(j => {
            if (j===i) return;
            const d = nodeVec3s[i].distanceTo(nodeVec3s[j]);
            if (d < maxDist) result.push({j, d});
          });
        }
      }
    }
    return result;
  }

  const edgePositions = [];
  const edgeColors    = [];
  const edgesBuilt    = new Set();
  let   edgeCount     = 0;

  for (let i = 0; i < TOKEN.NODE_COUNT && edgeCount < TOKEN.EDGE_PAIRS; i++) {
    const neighbours = nearbyNodes(i, 0.28).sort((a,b)=>a.d-b.d);
    let connected = 0;
    for (const {j, d} of neighbours) {
      if (connected >= 2) break;
      const pk = i<j ? `${i}-${j}` : `${j}-${i}`;
      if (edgesBuilt.has(pk)) continue;
      edgesBuilt.add(pk);
      const a = nodeVec3s[i], b = nodeVec3s[j];
      edgePositions.push(a.x,a.y,a.z, b.x,b.y,b.z);
      const alpha = clamp(1.0 - d/0.28, 0, 1)*0.55;
      const ec    = coreColor.clone().lerp(glowColor, d/0.28);
      edgeColors.push(
        ec.r*alpha, ec.g*alpha, ec.b*alpha,
        ec.r*alpha*0.4, ec.g*alpha*0.4, ec.b*alpha*0.4
      );
      edgeCount++; connected++;
      if (edgeCount >= TOKEN.EDGE_PAIRS) break;
    }
  }

  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(edgePositions), 3));
  edgeGeo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(edgeColors),    3));

  const edgeMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute vec3  color;
      uniform   float uTime;
      varying   vec3  vColor;
      varying   float vAlpha;
      float hash(float n){ return fract(sin(n)*43758.5453123); }
      void main(){
        vColor = color;
        float phase  = hash(position.x*13.7+position.y*29.3);
        vAlpha = 0.4+0.6*abs(sin(uTime*1.5+phase*6.28318));
        float breath = 0.92+0.08*sin(uTime*1.2+phase*6.28318);
        gl_Position  = projectionMatrix*modelViewMatrix*vec4(position*breath,1.0);
      }
    `,
    fragmentShader: `
      varying vec3  vColor;
      varying float vAlpha;
      void main(){ gl_FragColor = vec4(vColor, vAlpha); }
    `,
    transparent:  true,
    depthWrite:   false,
    vertexColors: true,
    blending:     THREE.AdditiveBlending,
  });

  const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);

  /* ---- 3. HEX MESH OVERLAY ---- */
  const HEX_POS = [], HEX_COL = [];

  function hexVerts(center, radius, normal) {
    const worldUp = Math.abs(normal.y) < 0.9
      ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
    const tU = new THREE.Vector3().crossVectors(normal, worldUp).normalize();
    const tV = new THREE.Vector3().crossVectors(normal, tU).normalize();
    const vs = [];
    for (let k=0; k<6; k++) {
      const a = (k/6)*Math.PI*2 + Math.PI/6;
      vs.push(center.clone().addScaledVector(tU, Math.cos(a)*radius)
                             .addScaledVector(tV, Math.sin(a)*radius));
    }
    return vs;
  }

  function pushHex(center, radius, normal, alpha) {
    const vs  = hexVerts(center, radius, normal);
    const col = coreColor.clone().multiplyScalar(alpha);
    for (let e=0; e<6; e++) {
      const a = vs[e], b = vs[(e+1)%6];
      HEX_POS.push(a.x,a.y,a.z, b.x,b.y,b.z);
      HEX_COL.push(col.r,col.g,col.b, col.r,col.g,col.b);
    }
  }

  for (let row=0; row<10; row++) {
    for (let col=0; col<8; col++) {
      const t   = clamp(0.20+(row/10)*0.55+(col/8)*0.12, 0, 1);
      const phi = (0.85+(col/8)*0.80)*Math.PI + (row%2===0?0:0.06);
      const {x,y,z} = headSurface(t, phi);
      const center  = new THREE.Vector3(x,y,z);
      const dt  = 0.02;
      const p1  = headSurface(clamp(t+dt,0,1), phi);
      const p2  = headSurface(t, phi+dt);
      const dT  = new THREE.Vector3(p1.x-x,p1.y-y,p1.z-z).normalize();
      const dP  = new THREE.Vector3(p2.x-x,p2.y-y,p2.z-z).normalize();
      const normal = new THREE.Vector3().crossVectors(dT,dP).normalize();
      if (normal.lengthSq()<0.001) normal.set(0,0,1);
      const ef = smoothstep(0,0.15,col/8)*smoothstep(0,0.15,1-col/8)*
                 smoothstep(0,0.15,row/10)*smoothstep(0,0.15,1-row/10);
      if (ef>0.05) pushHex(center, 0.10, normal, ef*0.9);
    }
  }

  const hexGeo = new THREE.BufferGeometry();
  hexGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(HEX_POS), 3));
  hexGeo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(HEX_COL), 3));

  const hexMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute vec3  color;
      uniform   float uTime;
      varying   vec3  vColor;
      float hash(float n){ return fract(sin(n)*43758.5453123); }
      void main(){
        vColor = color;
        float phase  = hash(position.x*7.3+position.z*19.1);
        float breath = 0.92+0.08*sin(uTime*1.2+phase*6.28318);
        gl_Position  = projectionMatrix*modelViewMatrix*vec4(position*breath,1.0);
      }
    `,
    fragmentShader: `
      varying vec3  vColor;
      uniform float uTime;
      void main(){
        float pulse = 0.7+0.3*sin(uTime*0.8);
        gl_FragColor = vec4(vColor*pulse, 0.85);
      }
    `,
    transparent:  true,
    depthWrite:   false,
    vertexColors: true,
    blending:     THREE.AdditiveBlending,
  });

  const hexLines = new THREE.LineSegments(hexGeo, hexMat);

  /* ---- 4. HAIR FILAMENTS & HALO RINGS ---- */
  const HAIR_POS = [], HAIR_COL = [];
  const hairColor = new THREE.Color(TOKEN.ACCENT_CORE);

  function pushPolyline(points, color, alpha) {
    for (let i=0; i<points.length-1; i++) {
      const a = points[i], b = points[i+1];
      const t  = i/points.length;
      const a2 = clamp(alpha*(1-t*0.6), 0, 1);
      HAIR_POS.push(a.x,a.y,a.z, b.x,b.y,b.z);
      HAIR_COL.push(
        color.r*a2,color.g*a2,color.b*a2,
        color.r*a2*0.5,color.g*a2*0.5,color.b*a2*0.5
      );
    }
  }

  for (let s=0; s<16; s++) {
    const basePhi  = (s/16)*Math.PI*2 + (Math.random()-0.5)*0.4;
    const baseT    = clamp(0.80+Math.random()*0.15, 0, 1);
    const {x:bx,y:by,z:bz} = headSurface(baseT, basePhi);
    const path = [new THREE.Vector3(bx,by,bz)];
    const arcLateral = (Math.random()-0.5)*0.8;
    const arcHeight  = 0.4+Math.random()*0.9;
    const arcDepth   = (Math.random()-0.5)*0.5;
    for (let k=1; k<=12; k++) {
      const u    = k/12, eu = u*u;
      const prev = path[path.length-1];
      const next = prev.clone();
      next.y += (arcHeight/12)*(1-eu*0.5);
      next.x += (arcLateral/12)+(Math.random()-0.5)*0.03;
      next.z += (arcDepth/12)+(Math.random()-0.5)*0.03;
      path.push(next);
    }
    const isFilament = s%3===0;
    const strandAlpha = isFilament ? 0.90 : 0.18;
    const strandColor = isFilament
      ? hairColor.clone()
      : hairColor.clone().lerp(new THREE.Color(0x050505), 0.85);
    pushPolyline(path, strandColor, strandAlpha);
  }

  for (let ring=0; ring<2; ring++) {
    const rY  = 0.9+ring*0.3, rX=0.65-ring*0.12, rZ=0.55-ring*0.08;
    const ra  = ring===0?0.65:0.35;
    const pts = [];
    for (let k=0; k<=64; k++) {
      const a = (k/64)*Math.PI*2;
      pts.push(new THREE.Vector3(rX*Math.cos(a), rY+0.04*Math.sin(a*3), rZ*Math.sin(a)));
    }
    pushPolyline(pts, hairColor.clone(), ra);
  }

  const hairGeo = new THREE.BufferGeometry();
  hairGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(HAIR_POS), 3));
  hairGeo.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(HAIR_COL), 3));

  const hairMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute vec3  color;
      uniform   float uTime;
      varying   vec3  vColor;
      float hash(float n){ return fract(sin(n)*43758.5453123); }
      void main(){
        vColor = color;
        float phase = hash(position.x*11.7+position.y*23.9);
        float sway  = 0.012*sin(uTime*0.9+phase*6.28);
        vec3  pos   = position;
        pos.x += sway*(position.y+1.3);
        pos.z += sway*0.5;
        gl_Position = projectionMatrix*modelViewMatrix*vec4(pos,1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main(){ gl_FragColor = vec4(vColor, 1.0); }
    `,
    transparent:  true,
    depthWrite:   false,
    vertexColors: true,
    blending:     THREE.AdditiveBlending,
  });

  const hairLines = new THREE.LineSegments(hairGeo, hairMat);

  /* ---- 5. AMBIENT PARTICLES ---- */
  const ambPositions  = new Float32Array(TOKEN.PARTICLE_COUNT * 3);
  const ambVelocities = [];
  for (let i=0; i<TOKEN.PARTICLE_COUNT; i++) {
    const theta = Math.random()*Math.PI*2;
    const phi2  = Math.acos(2*Math.random()-1);
    const r     = 1.1+Math.random()*1.2;
    ambPositions[i*3]   = r*Math.sin(phi2)*Math.cos(theta);
    ambPositions[i*3+1] = r*Math.cos(phi2)*0.85;
    ambPositions[i*3+2] = r*Math.sin(phi2)*Math.sin(theta);
    ambVelocities.push(
      (Math.random()-0.5)*0.0008,
      (Math.random()-0.5)*0.0008,
      (Math.random()-0.5)*0.0008
    );
  }

  const ambGeo     = new THREE.BufferGeometry();
  const ambPosAttr = new THREE.BufferAttribute(ambPositions, 3);
  ambPosAttr.setUsage(THREE.DynamicDrawUsage);
  ambGeo.setAttribute('position', ambPosAttr);

  const ambMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime:       { value: 0 },
      uPointScale: { value: renderer.getPixelRatio()*80 },
    },
    vertexShader: `
      uniform float uTime;
      uniform float uPointScale;
      varying float vAlpha;
      float hash(float n){ return fract(sin(n)*43758.5453123); }
      void main(){
        float phase  = hash(position.x*13.3+position.y*27.7+position.z*41.1);
        vAlpha       = 0.15+0.60*abs(sin(uTime*1.3+phase*6.28318));
        vec4 mvPos   = modelViewMatrix*vec4(position,1.0);
        gl_PointSize = uPointScale/(-mvPos.z)*(0.6+0.8*vAlpha);
        gl_Position  = projectionMatrix*mvPos;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main(){
        vec2  uv   = gl_PointCoord*2.0-1.0;
        float dist = length(uv);
        if(dist>1.0) discard;
        float alpha = (1.0-dist)*(1.0-dist)*vAlpha;
        vec3  col   = vec3(0.24,0.86,0.52)*(0.5+0.5*(1.0-dist));
        gl_FragColor = vec4(col, alpha*0.7);
      }
    `,
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });

  const ambParticles = new THREE.Points(ambGeo, ambMat);
  scene.add(ambParticles);

  /* ---- 6. HEAD GROUP ---- */
  const headGroup = new THREE.Group();
  headGroup.add(nodePoints);
  headGroup.add(edgeLines);
  headGroup.add(hexLines);
  headGroup.add(hairLines);
  headGroup.rotation.x = 0.12;
  scene.add(headGroup);

  /* ---- 7. MOUSE TRACKING ---- */
  const mouseTarget  = { x: 0, y: 0 };
  const mouseCurrent = { x: 0, y: 0 };
  const MAX_ROT_X    = 0.22;
  const MAX_ROT_Y    = 0.35;
  const LERP_SPEED   = 0.06;

  function onMouseMove(e) {
    const nx = (e.clientX / window.innerWidth)  * 2 - 1;
    const ny = (e.clientY / window.innerHeight) * 2 - 1;
    mouseTarget.y =  nx * MAX_ROT_Y;
    mouseTarget.x = -ny * MAX_ROT_X;
  }

  function onTouchMove(e) {
    if (!e.touches.length) return;
    const nx = (e.touches[0].clientX / window.innerWidth)  * 2 - 1;
    const ny = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
    mouseTarget.y =  nx * MAX_ROT_Y;
    mouseTarget.x = -ny * MAX_ROT_X;
  }

  window.addEventListener('mousemove', onMouseMove, { passive: true });
  window.addEventListener('touchmove', onTouchMove, { passive: true });

  /* ---- 8. RENDER LOOP ---- */
  const clock = new THREE.Clock();
  let animFrameId = null;

  const timeUniforms = [
    nodeMat.uniforms.uTime,
    edgeMat.uniforms.uTime,
    hexMat.uniforms.uTime,
    hairMat.uniforms.uTime,
    ambMat.uniforms.uTime,
  ];

  function animate() {
    animFrameId = requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    timeUniforms.forEach(u => { u.value = elapsed; });

    mouseCurrent.x = lerp(mouseCurrent.x, mouseTarget.x, LERP_SPEED);
    mouseCurrent.y = lerp(mouseCurrent.y, mouseTarget.y, LERP_SPEED);

    headGroup.rotation.x = 0.12 + mouseCurrent.x;
    headGroup.rotation.y = mouseCurrent.y;

    const breathScale = 1.0 + 0.018 * Math.sin(elapsed * 1.2);
    headGroup.scale.setScalar(breathScale);

    /* Update ambient particle drift */
    const pos = ambGeo.attributes.position;
    for (let i=0; i<TOKEN.PARTICLE_COUNT; i++) {
      let px = pos.getX(i) + ambVelocities[i*3];
      let py = pos.getY(i) + ambVelocities[i*3+1];
      let pz = pos.getZ(i) + ambVelocities[i*3+2];

      const dist = Math.sqrt(px*px + py*py*1.37 + pz*pz);
      if (dist > 2.4) {
        const theta = Math.random()*Math.PI*2;
        const phi2  = Math.acos(2*Math.random()-1);
        const r     = 1.1+Math.random()*0.3;
        px = r*Math.sin(phi2)*Math.cos(theta);
        py = r*Math.cos(phi2)*0.85;
        pz = r*Math.sin(phi2)*Math.sin(theta);
      }

      const att = 0.00012;
      ambVelocities[i*3]   += -px*att;
      ambVelocities[i*3+1] += -py*att;
      ambVelocities[i*3+2] += -pz*att;

      pos.setXYZ(i, px, py, pz);
    }
    pos.needsUpdate = true;

    renderer.render(scene, camera);
  }

  animate();

  /* ---- 9. CLEANUP ---- */
  const mutObs = new MutationObserver(() => {
    if (!document.body.contains(canvas)) {
      cancelAnimationFrame(animFrameId);
      renderer.dispose();
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('resize',    onResize);
      mutObs.disconnect();
    }
  });
  mutObs.observe(document.body, { childList: true, subtree: true });

})(); /* end initNeuralHead IIFE */

/* ================================================================
   SECTION H — MAIN LOOP (starts after fonts ready)
   ================================================================ */

async function runLoop() {
  while (true) {
    await runHero();
    await runManifesto();
    await runCarousel();
  }
}

document.fonts.ready.then(() => {
  runLoop().catch(err => console.error('[SynapseX]', err));
});
</script>
</body>
</html>
